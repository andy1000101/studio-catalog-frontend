<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Catalog Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* CSS specifically configured to make browsers print perfect A4 pages */
        @media print {
            body { background: white; color: black; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            .print-page { 
                padding: 0 !important; 
                margin: 0 !important; 
                box-shadow: none !important; 
                max-width: 100% !important;
            }
            .catalog-grid {
                display: grid !important;
                grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
                gap: 2rem !important;
            }
            .product-card { 
                page-break-inside: avoid !important; 
                break-inside: avoid !important;
            }
            @page { size: A4 portrait; margin: 20mm; }
        }
    </style>
</head>
<body class="bg-stone-100 text-stone-900 min-h-screen p-4 md:p-12 font-sans flex flex-col items-center">

    <div class="no-print w-full max-w-4xl bg-white border border-stone-200 p-6 rounded-lg shadow-sm mb-12">
        <h1 class="text-xl font-light tracking-tight mb-1">Studio Catalog Builder</h1>
        <p class="text-xs text-stone-400 mb-6">Fill in the product details below. Click "Add Product" to build your grid, then hit "Print/Save Catalog".</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-xs font-medium text-stone-500 uppercase tracking-wider mb-1">Product Title</label>
                <input type="text" id="pTitle" class="w-full p-2.5 border border-stone-200 text-sm rounded focus:outline-none focus:border-stone-900" placeholder="e.g., Totem Light No. 1">
            </div>
            <div>
                <label class="block text-xs font-medium text-stone-500 uppercase tracking-wider mb-1">Price / Variant</label>
                <input type="text" id="pPrice" class="w-full p-2.5 border border-stone-200 text-sm rounded focus:outline-none focus:border-stone-900" placeholder="e.g., ₹45,000 / $550">
            </div>
            <div class="md:col-span-2">
                <label class="block text-xs font-medium text-stone-500 uppercase tracking-wider mb-1">Product Image Link (URL)</label>
                <input type="text" id="pImage" class="w-full p-2.5 border border-stone-200 text-sm rounded focus:outline-none focus:border-stone-900" placeholder="Paste image address from your website">
            </div>
            <div class="md:col-span-2">
                <label class="block text-xs font-medium text-stone-500 uppercase tracking-wider mb-1">Description / Specifications</label>
                <textarea id="pDesc" rows="3" class="w-full p-2.5 border border-stone-200 text-sm rounded focus:outline-none focus:border-stone-900" placeholder="Enter materials, dimensions, or details..."></textarea>
            </div>
        </div>

        <div class="flex gap-3">
            <button onclick="addProduct()" class="flex-1 bg-stone-900 text-white text-sm py-2.5 rounded font-medium hover:bg-stone-800 transition-colors">
                Add Product to Catalog
            </button>
            <button onclick="window.print()" class="bg-stone-200 text-stone-800 text-sm px-6 py-2.5 rounded font-medium hover:bg-stone-300 transition-colors">
                Print / Save PDF
            </button>
        </div>
    </div>

    <div class="print-page w-full max-w-4xl bg-white border border-stone-200 p-16 shadow-sm min-h-[297mm]">
        <div class="border-b border-stone-900 pb-6 mb-12 flex justify-between items-end">
            <div>
                <span class="text-xs uppercase tracking-widest text-stone-400 font-medium">Product Overview</span>
                <h2 class="text-3xl font-light tracking-tight mt-1">Studio Collection</h2>
            </div>
            <span class="text-xs uppercase tracking-widest text-stone-500 font-medium">Confidential Line-Sheet</span>
        </div>

        <div id="catalogGrid" class="catalog-grid grid grid-cols-1 sm:grid-cols-2 gap-12">
            <div id="placeholderText" class="col-span-2 text-center py-12 text-stone-300 font-light text-sm italic">
                No products added yet. Use the dashboard panel above to construct your catalog sheet view.
            </div>
        </div>
    </div>

    <script>
        function addProduct() {
            const title = document.getElementById('pTitle').value.trim();
            const price = document.getElementById('pPrice').value.trim();
            const image = document.getElementById('pImage').value.trim();
            const desc = document.getElementById('pDesc').value.trim();

            if(!title) return alert('Please enter at least a product title.');

            // Remove placeholder if it exists
            const placeholder = document.getElementById('placeholderText');
            if(placeholder) placeholder.remove();

            const grid = document.getElementById('catalogGrid');

            // Generate clean, structured product markup
            const productHTML = `
                <div class="product-card flex flex-col border-b border-stone-100 pb-6">
                    ${image ? `<div class="w-full h-64 bg-stone-50 mb-4 overflow-hidden"><img src="${image}" class="w-full h-full object-cover"></div>` : '<div class="w-full h-64 bg-stone-100 mb-4 flex items-center justify-center text-xs text-stone-400 italic">No image provided</div>'}
                    <div class="flex justify-between items-baseline mb-2">
                        <h3 class="text-lg font-normal tracking-tight">${title}</h3>
                        <span class="text-sm font-medium text-stone-600">${price ? price : 'Price on Request'}</span>
                    </div>
                    <p class="text-xs text-stone-500 leading-relaxed font-light">${desc ? desc : 'Custom material specifications available upon request.'}</p>
                </div>
            `;

            grid.insertAdjacentHTML('beforeend', productHTML);

            // Reset input values smoothly for the next item
            document.getElementById('pTitle').value = '';
            document.getElementById('pPrice').value = '';
            document.getElementById('pImage').value = '';
            document.getElementById('pDesc').value = '';
        }
    </script>
</body>
</html>
