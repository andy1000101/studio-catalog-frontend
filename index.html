<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Studio Catalog Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 text-stone-900 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-xl w-full bg-white border border-stone-200 p-8 rounded-lg shadow-sm">
        <h1 class="text-2xl font-light tracking-tight mb-2">Studio Line-Sheet Builder</h1>
        <p class="text-sm text-stone-500 mb-6">Paste your product links below to generate an editorial PDF catalog instantly.</p>
        
        <textarea id="urls" rows="6" class="w-full p-4 border border-stone-200 rounded font-mono text-xs focus:outline-none focus:border-stone-900 mb-4" placeholder="https://yourstudio.com/product-1&#10;https://yourstudio.com/product-2"></textarea>
        
        <button onclick="generateCatalog()" id="btn" class="w-full bg-stone-900 text-white text-sm py-3 rounded font-medium hover:bg-stone-800 transition-colors">
            Generate Catalog PDF
        </button>
    </div>

    <script>
        async function generateCatalog() {
            const btn = document.getElementById('btn');
            const urlInput = document.getElementById('urls').value;
            if(!urlInput.trim()) return alert('Please paste at least one link.');

            btn.innerText = 'Assembling Catalog...';
            btn.disabled = true;

            try {
                // Swap this URL with your live Render backend link later
                const response = await fetch('https://studio-catalog-backend.onrender.com/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ urls: urlInput.split('\n').filter(u => u.trim()) })
                });

                if (!response.ok) throw new Error('Generation failed.');

                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = "studio_product_catalog.pdf";
                document.body.appendChild(a);
                a.click();
                a.remove();
            } catch (err) {
                alert('Error generating catalog. Ensure backend is awake.');
            } finally {
                btn.innerText = 'Generate Catalog PDF';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
